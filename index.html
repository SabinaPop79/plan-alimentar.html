<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Plan Alimentar — O Lună</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sage:#3D7A57;--sage-dk:#1E4D35;--sage-lt:#EBF5EE;
  --rose:#C0604A;--rose-lt:#FBF0ED;
  --amber:#B07B12;--amber-lt:#FBF3E2;
  --plum:#6B4C8A;--plum-lt:#F3EEF9;
  --bg:#F9F6F1;--card:#FFFFFF;
  --txt:#1A1916;--muted:#7A7570;--faint:#EDE9E3;--border:#E4DDD5;
  --r:14px
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:calc(40px + env(safe-area-inset-bottom,0))}

/* ── HEADER ── */
.hdr{background:var(--sage-dk);padding:calc(44px + env(safe-area-inset-top,0)) 20px 22px;position:relative;overflow:hidden}
.hdr::before,.hdr::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.04)}
.hdr::before{width:200px;height:200px;right:-50px;top:-60px}
.hdr::after{width:120px;height:120px;right:30px;bottom:-50px}
.hdr-eyebrow{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#fff;line-height:1.15;margin-bottom:8px}
.hdr h1 em{font-style:italic;font-weight:400}
.hdr-desc{font-size:12px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:16px}
.hdr-pills{display:flex;gap:8px;flex-wrap:wrap}
.hdr-pill{font-size:10px;font-weight:500;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7)}

/* ── WEEK TABS ── */
.week-tabs{background:var(--sage-dk);padding:10px 16px 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.week-tabs::-webkit-scrollbar{display:none}
.wtab{flex-shrink:0;padding:9px 18px 12px;border-radius:10px 10px 0 0;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;color:rgba(255,255,255,.45);cursor:pointer;transition:all .2s;white-space:nowrap}
.wtab.on{background:var(--bg);color:var(--txt)}

/* ── WEEK VIEW ── */
.wview{display:none}
.wview.on{display:block}

/* ── DAY NAV ── */
.day-nav{background:var(--bg);padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.day-nav::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px 10px;border-radius:10px;border:1.5px solid transparent;background:transparent;cursor:pointer;transition:all .2s}
.dpill.on{background:var(--card);border-color:var(--border)}
.dpill .da{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.dpill.on .da{color:var(--txt)}
.dpill .dn{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;line-height:1;color:var(--muted)}
.dpill.on .dn{color:var(--txt)}
.dpill .dt{width:5px;height:5px;border-radius:50%;margin-top:2px}
.dpill .dt.p{background:#7EC8A0}
.dpill .dt.n{background:#E8A87C}

/* ── CONTENT ── */
.content{padding:16px}
.dview{display:none;animation:fi .2s ease}
.dview.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.day-top{margin-bottom:16px}
.dtype{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:5px 12px;border-radius:20px;margin-bottom:10px}
.dtype.post{background:var(--sage-lt);color:var(--sage-dk)}
.dtype.norm{background:#FFF3EC;color:#8B3A20}
.dtype::before{content:'';width:6px;height:6px;border-radius:50%}
.dtype.post::before{background:var(--sage)}
.dtype.norm::before{background:var(--rose)}
.kcal-n{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:600;line-height:1;color:var(--txt)}
.kcal-u{font-size:12px;color:var(--muted);margin-top:2px;margin-bottom:10px}
.post-note{background:var(--sage-lt);border:1px solid #A8D5BB;border-radius:10px;padding:10px 13px;font-size:12px;color:var(--sage-dk);line-height:1.5;margin-bottom:14px}

.sec-hdr{display:flex;align-items:center;gap:10px;margin:16px 0 10px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── MEAL CARD ── */
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.mc.dessert{border-color:#E8C9BE}
.mc-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.mc-meta{flex:1;min-width:0}
.mc-type{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.mc-type.d{color:var(--rose)}
.mc-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;line-height:1.3;font-style:italic}
.mc-sub{font-size:11px;color:var(--muted);margin-top:4px}
.mc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:9px;font-weight:600;padding:2px 8px;border-radius:8px;background:var(--sage-lt);color:var(--sage-dk)}
.tag.h{background:var(--plum-lt);color:var(--plum)}
.chev{width:28px;height:28px;flex-shrink:0;background:var(--faint);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-left:10px;transition:all .2s}
.chev svg{transition:transform .25s}
.mc.open .chev{background:var(--sage-lt)}
.mc.open .chev svg{transform:rotate(180deg)}

.mc-body{display:none;border-top:1px solid var(--border)}
.mc.open .mc-body{display:block}

/* tabs */
.tabs{display:flex;background:var(--faint)}
.tab{flex:1;padding:10px 4px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--sage-dk);border-bottom-color:var(--sage)}
.panel{display:none;padding:14px 16px 18px}
.panel.on{display:block}

/* ingredients */
.ings{list-style:none}
.ing{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--faint);font-size:13px;line-height:1.4}
.ing:last-child{border:none}
.ing-ic{width:20px;height:20px;background:var(--sage-lt);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ing-ic svg{width:9px;height:9px;fill:var(--sage)}
.ing-q{font-weight:600;font-size:12px;color:var(--sage-dk);min-width:68px;flex-shrink:0}
.ing-nm{color:var(--txt)}

/* steps */
.steps{list-style:none}
.step{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--faint);font-size:13px;line-height:1.55}
.step:last-child{border:none}
.sn{min-width:22px;height:22px;background:var(--sage-dk);color:#fff;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* macros */
.macros{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.mac{background:var(--faint);border-radius:10px;padding:10px 4px;text-align:center}
.mac-v{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
.mac-l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.tip-box{background:var(--amber-lt);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:10px 12px;font-size:12px;color:#6B4E00;line-height:1.55;margin-top:10px}
.horm-box{background:var(--plum-lt);border-left:3px solid var(--plum);border-radius:0 8px 8px 0;padding:10px 12px;font-size:12px;color:#4A2D6A;line-height:1.55;margin-top:8px}
</style>
</head>

const WEEK_NAMES = ['Săptămâna 1','Săptămâna 2','Săptămâna 3','Săptămâna 4'];
const DAY_LABELS = ['Lun','Mar','Mie','Joi','Vin','Sâm','Dum'];
const DAY_FULL = ['Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă','Duminică'];

// ─── BUILD UI ────────────────────────────────────────────────────────────────
let curWeek = 0;
let curDay = [0,0,0,0];

function kcalDay(dayObj) {
  const keys = [dayObj.bf, dayObj.lu, dayObj.dn, dayObj.sn, dayObj.ds].filter(Boolean);
  return keys.reduce((s,k)=>s+(R[k]?R[k].kcal:0),0);
}

function buildRecipe(key, isSnack) {
  const r = R[key];
  if (!r) return '';
  const isDessert = !!r.dessert;
  let html = `<div class="mc${isDessert?' dessert':''}" onclick="toggleMC(this)">
<div class="mc-hdr">
<div class="mc-meta">
<div class="mc-type${isDessert?' d':''}">${r.slot}</div>
<div class="mc-name">${r.name}</div>
<div class="mc-sub">~${r.kcal} kcal · ${r.p}g proteină · ${r.f}g grăsimi · ${r.c}g carbo</div>`;
  if (r.tags && r.tags.length) {
    html += `<div class="mc-tags">`;
    r.tags.forEach(t=>{ html+=`<span class="tag">${t}</span>`; });
    html += `</div>`;
  }
  html += `</div><div class="chev">${CHV}</div></div>
<div class="mc-body">
<div class="tabs">
<div class="tab on" onclick="swTab(event,this,'i')">Ingrediente</div>
<div class="tab" onclick="swTab(event,this,'p')">Preparare</div>
<div class="tab" onclick="swTab(event,this,'n')">Nutriție</div>
</div>
<div class="panel on" data-t="i"><ul class="ings">`;
  r.ing.forEach(([q,nm])=>{ html+=`<li class="ing"><div class="ing-ic">${ING_IC}</div><span class="ing-q">${q}</span><span class="ing-nm">${nm}</span></li>`; });
  html += `</ul></div><div class="panel" data-t="p"><ol class="steps">`;
  r.steps.forEach((s,i)=>{ html+=`<li class="step"><div class="sn">${i+1}</div><span>${s}</span></li>`; });
  html += `</ol>`;
  if (r.tip) html += `<div class="tip-box"><strong>Sfat bucătar:</strong> ${r.tip}</div>`;
  html += `</div><div class="panel" data-t="n"><div class="macros">
<div class="mac"><div class="mac-v">${r.kcal}</div><div class="mac-l">Kcal</div></div>
<div class="mac"><div class="mac-v">${r.p}g</div><div class="mac-l">Proteine</div></div>
<div class="mac"><div class="mac-v">${r.f}g</div><div class="mac-l">Grăsimi</div></div>
<div class="mac"><div class="mac-v">${r.c}g</div><div class="mac-l">Carbo</div></div>
</div>`;
  if (r.horm) html += `<div class="horm-box"><strong>Efect hormonal:</strong> ${r.horm}</div>`;
  html += `</div></div></div>`;
  return html;
}

function buildDayView(weekIdx, dayIdx, show) {
  const d = STRUCTURE[weekIdx][dayIdx];
  const isPost = d.type === 'post';
  const totalKcal = kcalDay(d);
  let html = `<div class="dview${show?' on':''}" id="dv_${weekIdx}_${dayIdx}">
<div class="day-top">
<div class="dtype ${isPost?'post':'norm'}">${isPost?'Zi de post · Vegan':'Zi normală'}</div>
<div class="kcal-n">~${totalKcal}</div>
<div class="kcal-u">kcal total${isPost?' · fără carne, ouă, lactate':''}</div>`;
  if (isPost) html += `<div class="post-note"><strong>Miere permisă!</strong> Evită doar: carne, pește, ouă, lactate. Mierea este produs vegetal și rămâne în meniu.</div>`;
  html += `</div>`;

  // Mese principale
  html += `<div class="sec-hdr">Mese principale</div>`;
  html += buildRecipe(d.bf);
  html += buildRecipe(d.lu);
  if (d.sn) html += buildRecipe(d.sn, true);
  html += buildRecipe(d.dn);

  // Desert
  html += `<div class="sec-hdr">Desert zilnic</div>`;
  html += buildRecipe(d.ds);

  html += `</div>`;
  return html;
}

function buildWeekView(weekIdx, show) {
  let html = `<div class="wview${show?' on':''}" id="wv_${weekIdx}">`;

  // Day nav
  html += `<div class="day-nav" id="dnav_${weekIdx}">`;
  STRUCTURE[weekIdx].forEach((d,di)=>{
    const isPost = d.type==='post';
    const active = di===0;
    html += `<button class="dpill${active?' on':''}" onclick="showDay(${weekIdx},${di})">
<span class="da">${DAY_LABELS[di]}</span>
<span class="dn">${di+1}</span>
<span class="dt ${isPost?'p':'n'}"></span>
</button>`;
  });
  html += `</div>`;

  // Day views
  html += `<div class="content">`;
  STRUCTURE[weekIdx].forEach((_,di)=>{
    html += buildDayView(weekIdx, di, di===0);
  });
  html += `</div></div>`;
  return html;
}

// Render
const wTabs = document.getElementById('wTabs');
const wViews = document.getElementById('wViews');

WEEK_NAMES.forEach((nm,wi)=>{
  const btn = document.createElement('button');
  btn.className = 'wtab'+(wi===0?' on':'');
  btn.textContent = nm;
  btn.onclick = ()=>showWeek(wi);
  wTabs.appendChild(btn);
  wViews.innerHTML += buildWeekView(wi, wi===0);
});

function showWeek(wi) {
  document.querySelectorAll('.wtab').forEach((b,i)=>b.classList.toggle('on',i===wi));
  document.querySelectorAll('.wview').forEach((v,i)=>v.classList.toggle('on',i===wi));
  curWeek = wi;
  window.scrollTo({top:0,behavior:'smooth'});
}

function showDay(wi, di) {
  document.querySelectorAll(`#dnav_${wi} .dpill`).forEach((p,i)=>p.classList.toggle('on',i===di));
  document.querySelectorAll(`#wv_${wi} .dview`).forEach((v,i)=>v.classList.toggle('on',i===di));
  curDay[wi] = di;
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleMC(card) { card.classList.toggle('open'); }

function swTab(e,tab,name) {
  e.stopPropagation();
  const body = tab.closest('.mc-body');
  body.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  body.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  tab.classList.add('on');
  body.querySelector(`[data-t="${name}"]`).classList.add('on');
}
</script>
</body>
